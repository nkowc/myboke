<!DOCTYPE html>
<html lang="cn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Maker MV Tools - Database ConVerter MV-中文翻译</title>
    <link rel="stylesheet" href="forum-style.css">
    <style>
        /* 基础样式重置与统一，不修改原有文字 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft Yahei", sans-serif;
        }
        body {
            padding: 20px;
            line-height: 1.6;
        }
        /* 返回按钮样式 */
        .back-btn {
            margin-bottom: 20px;
            padding: 8px 16px;
            cursor: pointer;
        }
        /* 简介、详细说明样式 */
        .intro, .detail {
            margin-bottom: 20px;
        }
        /* logo图片样式 */
        .logo-img {
            margin-bottom: 20px;
            max-width: 100%;
            height: auto;
        }
        /* 代码区域样式 */
        .code-section {
            margin: 20px 0;
            padding: 10px;
            background: #f5f5f5;
            border-radius: 4px;
        }
        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
            padding: 10px;
            background: #fff;
            border-radius: 4px;
            border: 1px solid #eee;
        }
        /* 更新历史样式 */
        .update-history {
            margin-bottom: 20px;
            padding: 10px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        /* 评论区样式（和之前保持一致） */
        .comment-section {
            margin-top: 30px;
            max-width: 800px;
        }
        #comment-input, .reply-input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            resize: vertical;
            min-height: 80px;
        }
        .reply-input {
            min-height: 60px;
            margin-left: 20px;
            width: calc(100% - 20px);
        }
        .submit-btn, .reply-btn {
            padding: 8px 16px;
            background: #4285f4;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .reply-btn {
            background: #0f9d58;
            padding: 4px 8px;
            font-size: 12px;
            margin-left: 10px;
        }
        .comments-list {
            margin-top: 20px;
        }
        .comment {
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #eee;
            border-radius: 4px;
        }
        .reply {
            margin: 10px 0 0 20px;
            padding: 8px;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .comment-meta {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }
        /* 页脚 */
        footer {
            margin-top: 48px;
            text-align: center;
            color: #999;
            padding: 16px 0;
        }

    </style>
</head>
<body>
    <!-- 返回按钮 -->
    <button class="back-btn" onclick="history.back()">返回上一頁</button>

    <!-- Logo图片 -->
    <img src="./image/logo_ch.png" alt="数据库转换器MV" class="logo-img">

    <!-- 简介 -->
    <div class="intro">
        <p>参照部分官方中文机翻，部分翻译的时候发现有些词是多意，所以选取了比较符合的翻译，覆盖原语言。</p>
    </div>

    <!-- 详细说明 -->
    <div class="detail">
        <p>
            此软件具体作用：<a href="https://rpg.blue/thread-488799-1-1.html">【附机翻】将数据库转换为Excel或CSV格式的免费软件</a>
        </p>
    </div>

    <!-- 更新历史 -->
    <div class="update-history">
        2022年03月06日 首次提交
        <br>2022年03月06日 修改错误翻译
        <br>2026年03月06日 由于用户协议已关闭分享
    </div>

    <!-- 版权 -->
    <footer>
        <p>© 2026 無心寒涵</p>
    </footer>

</body>

</html>
